services:
  postgres:
    image: postgres:16
    container_name: blood_bank_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blood_bank_db
      POSTGRES_USER: blood_bank_user
      POSTGRES_PASSWORD: blood_bank_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blood_bank_user -d blood_bank_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
